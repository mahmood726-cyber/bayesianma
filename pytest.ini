[pytest]
testpaths = tests
python_files = test_*.py
# Selenium tests in this project share a browser session and an asynchronous
# analysis pipeline; running them in random order surfaces flaky failures
# because later tests can land before the analysis kicked off by an earlier
# test has rendered. pytest-randomly is disabled to keep the suite
# deterministic. (Real fix is per-test browser isolation; see issue.)
addopts = -p no:randomly
